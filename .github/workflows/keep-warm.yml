name: Keep Backend Warm

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Backend
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Backend
        run: |
          curl -f https://landing-backend.onrender.com/ping
          echo "Backend is warm ✅"
